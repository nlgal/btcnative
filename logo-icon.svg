<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none" aria-label="BTC Native icon">
  <defs>
    <linearGradient id="g" x1="55" y1="8" x2="65" y2="112" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFB100"/>
      <stop offset="100%" stop-color="#FF8A00"/>
    </linearGradient>
  </defs>

  <!-- Pixel scatter — large squares at top, dispersing down-left into smaller ones -->
  <rect x="32" y="6"  width="13" height="13" rx="2.5" fill="url(#g)"/>
  <rect x="48" y="4"  width="12" height="12" rx="2"   fill="url(#g)"/>
  <rect x="62" y="7"  width="10" height="10" rx="2"   fill="url(#g)"/>
  <rect x="23" y="21" width="11" height="11" rx="2"   fill="url(#g)" opacity="0.9"/>
  <rect x="37" y="19" width="11" height="11" rx="2"   fill="url(#g)" opacity="0.9"/>
  <rect x="51" y="20" width="9"  height="9"  rx="1.8" fill="url(#g)" opacity="0.75"/>
  <rect x="15" y="34" width="9"  height="9"  rx="1.8" fill="url(#g)" opacity="0.6"/>
  <rect x="28" y="32" width="8"  height="8"  rx="1.5" fill="url(#g)" opacity="0.48"/>
  <rect x="10" y="46" width="7"  height="7"  rx="1.4" fill="url(#g)" opacity="0.32"/>
  <rect x="21" y="44" width="6"  height="6"  rx="1.2" fill="url(#g)" opacity="0.22"/>

  <!-- Outer arc — nearly full circle, center (60,62), r=50, break at top-left -->
  <path d="M 63 12 A 50 50 0 1 1 17 84" stroke="url(#g)" stroke-width="4.5" stroke-linecap="round" fill="none"/>
  <!-- White highlight arc at the break -->
  <path d="M 46 13 A 50 50 0 0 1 63 12" stroke="#FFFFFF" stroke-width="4.5" stroke-linecap="round" fill="none"/>
  <!-- Inner arc — partial lower sweep, tighter radius -->
  <path d="M 29 91 A 37 37 0 0 0 91 91" stroke="url(#g)" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.5"/>

  <!--
    ₿ tilted 12° clockwise around center (60,62)
    All B geometry fits inside circle r=50 centered at (60,62)
    Max right x before rotation: 84 (safe — at center y=62, circle right edge = 110)
    After 12° rotation rightward bumps shift slightly right, so keep apex ≤83
  -->
  <g transform="rotate(12, 60, 62)" fill="url(#g)">
    <!-- Stem x=54–64, y=25–95 -->
    <rect x="54" y="25" width="10" height="70" rx="2"/>
    <!-- Top tick -->
    <rect x="47" y="25" width="23" height="8" rx="2.5"/>
    <!-- Bottom tick -->
    <rect x="47" y="87" width="23" height="8" rx="2.5"/>
    <!-- Mid tick -->
    <rect x="47" y="54" width="21" height="7" rx="2"/>
    <!-- Upper D-bump: apex x=83 -->
    <path d="M 60 26 L 71 26 Q 85 26 85 41 Q 85 55 71 55 L 60 55 Z"/>
    <!-- Lower D-bump: apex x=85, slightly taller -->
    <path d="M 60 55 L 73 55 Q 87 55 87 70 Q 87 86 73 86 L 60 86 Z"/>
  </g>
</svg>
