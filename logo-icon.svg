<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none" aria-label="BTC Native icon">
  <defs>
    <linearGradient id="g" x1="30" y1="15" x2="85" y2="105" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFB100"/>
      <stop offset="100%" stop-color="#FF8A00"/>
    </linearGradient>
  </defs>

  <!-- Pixel dispersion — upper-left scatter -->
  <rect x="12" y="6"  width="12" height="12" rx="2.2" fill="url(#g)"/>
  <rect x="27" y="4"  width="10" height="10" rx="1.8" fill="url(#g)"/>
  <rect x="40" y="8"  width="10" height="10" rx="2"   fill="url(#g)"/>
  <rect x="8"  y="21" width="9"  height="9"  rx="1.8" fill="url(#g)" opacity="0.82"/>
  <rect x="21" y="18" width="8"  height="8"  rx="1.5" fill="url(#g)" opacity="0.65"/>
  <rect x="14" y="33" width="7"  height="7"  rx="1.4" fill="url(#g)" opacity="0.48"/>
  <rect x="26" y="28" width="6"  height="6"  rx="1.2" fill="url(#g)" opacity="0.38"/>
  <rect x="8"  y="36" width="5"  height="5"  rx="1"   fill="url(#g)" opacity="0.28"/>

  <!-- Outer orbit arc — broken at top-left -->
  <path d="M 63 13 A 47 47 0 1 1 19 82" stroke="url(#g)" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <!-- White highlight arc — short gap at top -->
  <path d="M 49 14 A 47 47 0 0 1 63 13" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <!-- Inner concentric arc — partial lower sweep -->
  <path d="M 30 87 A 36 36 0 0 0 90 87" stroke="url(#g)" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.6"/>

  <!--
    ₿ symbol — centered in circle
    Circle center ~(60,60), radius ~47
    B occupies roughly x:47–91, y:27–93
    Stem: x48–57, full height
    Upper bump: y28–56 (height 28)
    Lower bump: y56–88 (height 32, slightly taller per Bitcoin logo)
    Top tick: narrow stubs at y28 protrude left of stem
    Bottom tick: narrow stubs at y88
    Mid tick: narrow stubs at y54–58
  -->
  <!-- Vertical stem -->
  <rect x="48" y="28" width="8" height="62" rx="1.5" fill="url(#g)"/>
  <!-- Top stub (protrudes left only, small) -->
  <rect x="42" y="28" width="14" height="6.5" rx="2" fill="url(#g)"/>
  <!-- Bottom stub -->
  <rect x="42" y="83.5" width="14" height="6.5" rx="2" fill="url(#g)"/>
  <!-- Mid stub — the ₿ double-bar between bumps -->
  <rect x="42" y="53" width="14" height="6" rx="2" fill="url(#g)"/>
  <!-- Upper D-bump -->
  <path d="M 52 28 L 67 28 Q 84 28 84 42 Q 84 56 67 56 L 52 56 Z" fill="url(#g)"/>
  <!-- Lower D-bump (slightly wider/taller) -->
  <path d="M 52 56 L 69 56 Q 88 56 88 70 Q 88 84 69 84 L 52 84 Z" fill="url(#g)"/>
</svg>
