<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none" aria-label="BTC Native icon">
  <defs>
    <linearGradient id="g" x1="60" y1="8" x2="60" y2="112" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFB100"/>
      <stop offset="100%" stop-color="#FF8A00"/>
    </linearGradient>
  </defs>

  <!--
    Pixel scatter — upper-left
    3 loose columns dispersing away from the coin, largest near the coin, shrinking outward
    Column positions mapped from reference image
  -->
  <!-- Col A — rightmost / largest, attached to top of coin -->
  <rect x="46" y="14" width="11" height="11" rx="2"   fill="url(#g)"/>
  <rect x="35" y="20" width="10" height="10" rx="2"   fill="url(#g)"/>
  <!-- Col B — middle -->
  <rect x="28" y="11" width="9"  height="9"  rx="1.8" fill="url(#g)"/>
  <rect x="22" y="22" width="8"  height="8"  rx="1.6" fill="url(#g)"/>
  <rect x="28" y="31" width="7"  height="7"  rx="1.4" fill="url(#g)"/>
  <!-- Col C — leftmost / smallest -->
  <rect x="14" y="7"  width="7"  height="7"  rx="1.4" fill="url(#g)"/>
  <rect x="8"  y="17" width="6"  height="6"  rx="1.2" fill="url(#g)"/>
  <rect x="14" y="27" width="5"  height="5"  rx="1"   fill="url(#g)"/>
  <rect x="8"  y="35" width="4"  height="4"  rx="0.8" fill="url(#g)"/>

  <!--
    Two concentric arcs — both open at top-left
    Outer arc: r=49, center=(62,63), thick stroke
    Inner arc: r=42, center=(62,63), thinner, gap at top-left AND small gap bottom-right
  -->
  <!-- Outer arc — breaks at top-left ~225°→315° (i.e. draws from ~315° clockwise to ~225°) -->
  <path d="M 62 14 A 49 49 0 1 1 27 90" stroke="url(#g)" stroke-width="4" stroke-linecap="round" fill="none"/>
  <!-- White highlight at the break -->
  <path d="M 47 15 A 49 49 0 0 1 62 14" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" fill="none"/>
  <!-- Inner arc — slightly inside, broken at top-left and small gap bottom-right -->
  <path d="M 58 21 A 42 42 0 1 1 30 86" stroke="url(#g)" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.7"/>

  <!--
    ₿ symbol — upright, centered at (62,63)
    Standard Bitcoin proportions, large to fill circle
    Stem: x=54–64, y=22–100
    Upper bump D-curve: y=24–58, right apex ~x=88
    Lower bump D-curve: y=58–96, right apex ~x=90 (slightly larger)
    Top tick: y=22–30, protrudes left x=46
    Bottom tick: y=92–100, protrudes left x=46
    Mid tick: y=55–62, protrudes left x=46
  -->
  <!-- Stem -->
  <rect x="54" y="22" width="10" height="78" rx="1.5" fill="url(#g)"/>
  <!-- Top tick (protrudes above upper bump, sticks up through arc) -->
  <rect x="46" y="22" width="26" height="8"  rx="2" fill="url(#g)"/>
  <!-- Bottom tick -->
  <rect x="46" y="91" width="26" height="8"  rx="2" fill="url(#g)"/>
  <!-- Mid tick -->
  <rect x="46" y="55" width="24" height="7"  rx="2" fill="url(#g)"/>
  <!-- Upper D-bump -->
  <path d="M 60 24 L 72 24 Q 90 24 90 41 Q 90 57 72 57 L 60 57 Z" fill="url(#g)"/>
  <!-- Lower D-bump (slightly wider/taller) -->
  <path d="M 60 57 L 74 57 Q 93 57 93 73.5 Q 93 91 74 91 L 60 91 Z" fill="url(#g)"/>
</svg>
