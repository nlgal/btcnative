<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio — BTC Native</title>
  <meta name="description" content="View all Bitcoin names owned by a BTC address." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="./base.css" />
  <link rel="stylesheet" href="./style.css" />
  <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg" />
  <style>
    .port-wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: var(--space-10) var(--space-4) var(--space-16);
    }

    /* Search bar */
    .port-search-row {
      display: flex;
      gap: var(--space-2);
      margin-bottom: var(--space-8);
    }
    .port-addr-input {
      flex: 1;
      height: 48px;
      padding: 0 var(--space-4);
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      color: var(--color-text);
      font-size: var(--text-sm);
      font-family: var(--font-mono);
      outline: none;
      transition: border-color 0.15s;
      min-width: 0;
    }
    .port-addr-input:focus { border-color: var(--color-primary); }
    .port-addr-input::placeholder { color: var(--color-text-faint); font-size: var(--text-xs); }
    .port-search-btn {
      height: 48px;
      padding: 0 var(--space-5);
      background: var(--color-primary);
      color: #000;
      border: none;
      border-radius: var(--radius-md);
      font-weight: 700;
      font-size: var(--text-sm);
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s;
      flex-shrink: 0;
    }
    .port-search-btn:hover { opacity: 0.88; }
    .port-search-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    /* Header row */
    .port-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-5);
      min-height: 32px;
    }
    .port-header h2 {
      font-size: var(--text-lg);
      font-weight: 700;
      color: var(--color-text);
      margin: 0;
    }
    .port-count {
      font-size: var(--text-xs);
      color: var(--color-text-faint);
      font-family: var(--font-mono);
    }

    /* Tab bar */
    .port-tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--color-divider);
      margin-bottom: var(--space-6);
    }
    .port-tab {
      padding: var(--space-2) var(--space-4);
      font-size: var(--text-sm);
      font-weight: 500;
      color: var(--color-text-muted);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      margin-bottom: -1px;
      transition: color 0.15s, border-color 0.15s;
    }
    .port-tab:hover { color: var(--color-text); }
    .port-tab.active {
      color: var(--color-primary);
      border-bottom-color: var(--color-primary);
      font-weight: 700;
    }
    .port-tab-count {
      font-size: 10px;
      background: var(--color-surface-offset);
      border-radius: 99px;
      padding: 1px 6px;
      margin-left: 4px;
      color: var(--color-text-faint);
    }

    /* Grid */
    .port-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: var(--space-3);
    }

    /* Name card */
    .port-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: var(--space-4);
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s;
      text-decoration: none;
      color: inherit;
    }
    .port-card:hover {
      border-color: var(--color-border-strong);
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    [data-theme="dark"] .port-card:hover {
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }
    .port-card__header {
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }
    .port-card__avatar {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-full);
      background: var(--color-surface-offset);
      overflow: hidden;
      flex-shrink: 0;
    }
    .port-card__avatar img {
      width: 100%; height: 100%; object-fit: cover;
    }
    .port-card__name {
      font-family: var(--font-mono);
      font-size: var(--text-sm);
      font-weight: 700;
      color: var(--color-text);
      word-break: break-all;
    }
    .port-card__insc {
      font-size: 10px;
      color: var(--color-text-faint);
      font-family: var(--font-mono);
      word-break: break-all;
    }
    .port-card__badges {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-1);
    }
    .port-card__badge {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 99px;
      background: var(--color-surface-offset);
      color: var(--color-text-muted);
      border: 1px solid var(--color-border);
      font-family: var(--font-mono);
    }
    .port-card__badge--listed {
      background: color-mix(in srgb, #f7931a 12%, transparent);
      color: #f7931a;
      border-color: color-mix(in srgb, #f7931a 25%, transparent);
    }
    .port-card__price {
      font-size: var(--text-xs);
      font-family: var(--font-mono);
      color: var(--color-text-muted);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .port-card__price-val {
      font-weight: 700;
      color: var(--color-text);
    }
    .port-card__price-usd {
      color: var(--color-text-faint);
      font-weight: 400;
    }
    .port-card__actions {
      display: flex;
      gap: var(--space-2);
      margin-top: auto;
    }
    .port-card__btn {
      flex: 1;
      height: 30px;
      border-radius: var(--radius-sm);
      font-size: 11px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      transition: opacity 0.15s;
      text-align: center;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .port-card__btn:hover { opacity: 0.85; }
    .port-card__btn--primary {
      background: var(--color-primary);
      color: #000;
    }
    .port-card__btn--outline {
      background: none;
      border: 1px solid var(--color-border);
      color: var(--color-text-muted);
    }

    /* Stats bar */
    .port-stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: var(--space-3);
      margin-bottom: var(--space-6);
    }
    @media (max-width: 600px) {
      .port-stats { grid-template-columns: repeat(2, 1fr); }
    }
    .port-stat {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: var(--space-3) var(--space-4);
    }
    .port-stat__label {
      font-size: var(--text-xs);
      color: var(--color-text-faint);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: var(--space-1);
    }
    .port-stat__val {
      font-size: var(--text-base);
      font-weight: 800;
      font-family: var(--font-mono);
      color: var(--color-text);
    }
    .port-stat__val--accent { color: var(--color-primary); }
    .port-stat__sub {
      font-size: var(--text-xs);
      color: var(--color-text-faint);
      margin-top: 2px;
    }

    /* Load more */
    .port-load-wrap {
      text-align: center;
      margin-top: var(--space-6);
    }
    .port-load-btn {
      height: 40px;
      padding: 0 var(--space-8);
      background: none;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      color: var(--color-text-muted);
      font-size: var(--text-sm);
      font-weight: 600;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .port-load-btn:hover { border-color: var(--color-primary); color: var(--color-primary); }
    .port-load-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Skeleton */
    .port-card.skeleton-card {
      height: 156px;
    }

    /* Empty state */
    .port-empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: var(--space-16) var(--space-6);
      color: var(--color-text-faint);
    }
    .port-empty svg { margin-bottom: var(--space-4); opacity: 0.35; }
    .port-empty h3 { font-size: var(--text-base); color: var(--color-text-muted); margin-bottom: var(--space-2); }
    .port-empty p { font-size: var(--text-sm); max-width: 36ch; margin: 0 auto; }

    /* Address chip */
    .port-addr-chip {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-1) var(--space-3);
      background: var(--color-surface-offset);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-full);
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      margin-bottom: var(--space-6);
      word-break: break-all;
    }

    /* Heading area */
    .port-hero {
      margin-bottom: var(--space-6);
    }
    .port-hero h1 {
      font-size: var(--text-2xl);
      font-weight: 800;
      font-family: var(--font-display);
      color: var(--color-text);
      margin-bottom: var(--space-2);
      letter-spacing: -0.03em;
    }
    .port-hero p {
      font-size: var(--text-sm);
      color: var(--color-text-muted);
    }

    /* ── My Names grid ───────────────────────────────────────── */
    .name-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: var(--space-3);
    }
    .name-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: var(--space-4);
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .name-card:hover {
      border-color: var(--color-border-strong);
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    [data-theme="dark"] .name-card:hover {
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }
    .name-card__header {
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }
    .name-card__avatar {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-full);
      background: linear-gradient(135deg, var(--color-primary) 0%, #c0620a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--text-sm);
      font-weight: 800;
      color: #000;
      flex-shrink: 0;
      font-family: var(--font-mono);
    }
    .name-card__name {
      font-size: var(--text-sm);
      color: var(--color-text);
      word-break: break-all;
      line-height: 1.3;
    }
    /* skeleton pulse — reuse existing .skeleton class from base.css if available */
    .name-card.skeleton {
      animation: skeleton-pulse 1.5s ease-in-out infinite;
      background: var(--color-surface-offset);
      border-color: transparent;
    }
    @keyframes skeleton-pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.45; }
    }
  </style>
</head>

<script>
// ── Portfolio page ─────────────────────────────────────────────────────────────
// MARKET_API and UNISAT_API_KEY are defined in app.js
const UNISAT_BASE    = 'https://open-api.unisat.io';
const PAGE_SIZE      = 20;
const BTCNAME_TLDS   = ['.btc', '.sats', '.x', '.ord', '.gm', '.xbt', '.sat', '.unisat', '.fb'];

// BTC/USD
let _portBtcUsd = null;
async function getPortBtcUsd() {
  if (_portBtcUsd) return _portBtcUsd;
  try {
    const r = await fetch('https://mempool.space/api/v1/prices', { signal: AbortSignal.timeout(4000) });
    const d = await r.json();
    _portBtcUsd = d.USD || 95000;
  } catch { _portBtcUsd = 95000; }
  return _portBtcUsd;
}

function fmtBtc(sats) {
  if (!sats || isNaN(sats)) return '—';
  const btc = sats / 1e8;
  if (btc >= 1)    return btc.toFixed(4).replace(/\.?0+$/, '') + ' BTC';
  if (btc >= 0.01) return btc.toFixed(4).replace(/0+$/, '') + ' BTC';
  return btc.toFixed(8).replace(/0+$/, '') + ' BTC';
}
function fmtUsd(sats, rate) {
  if (!sats || !rate) return '';
  const usd = (sats / 1e8) * rate;
  if (usd >= 1000) return '$' + Math.round(usd).toLocaleString();
  if (usd >= 1) return '$' + usd.toFixed(2);
  return '$' + usd.toFixed(2);
}

function isBtcName(content) {
  if (!content) return false;
  const lower = content.toLowerCase().trim();
  return BTCNAME_TLDS.some(tld => lower.endsWith(tld));
}

// State
let allNames = [];         // all loaded name objects
let listedMap = {};        // name -> { listed, priceSats, auctionId }
let currentTab = 'all';
let currentAddress = '';
let currentPage = 0;
let hasMore = false;

// Tab switching
document.querySelectorAll('.port-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.port-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTab = btn.dataset.tab;
    renderGrid();
  });
});

// Load more
document.getElementById('loadMoreBtn').addEventListener('click', loadMore);

// Search button / enter
document.getElementById('lookupBtn').addEventListener('click', startLookup);
document.getElementById('addrInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') startLookup();
});

// Pre-fill from URL
(function() {
  const params = new URLSearchParams(location.search);
  const addr = params.get('address') || params.get('addr');
  if (addr) {
    document.getElementById('addrInput').value = addr;
    startLookup();
  }
})();

async function startLookup() {
  let addr = document.getElementById('addrInput').value.trim();
  if (!addr) return;

  // If input looks like a name (contains a dot, no spaces, not starting with bc1/1/3)
  const looksLikeName = addr.includes('.') && !addr.startsWith('bc1') && !addr.startsWith('1') && !addr.startsWith('3') && !addr.includes('@');
  if (looksLikeName) {
    const btn = document.getElementById('lookupBtn');
    btn.disabled = true;
    btn.textContent = 'Resolving...';
    try {
      const res = await fetch(`https://bnrp.name/api/resolve?domain=${encodeURIComponent(addr)}`);
      const data = await res.json();
      const owner = data?.address || data?.data?.address || data?.owner;
      if (owner) {
        document.getElementById('addrInput').value = owner;
        addr = owner;
      } else {
        document.getElementById('errorPanel').style.display = 'block';
        document.getElementById('errorMsg').textContent = `Could not resolve ${addr} to an address.`;
        btn.disabled = false;
        btn.textContent = 'Look up';
        return;
      }
    } catch {
      document.getElementById('errorPanel').style.display = 'block';
      document.getElementById('errorMsg').textContent = 'Resolution failed. Try entering the address directly.';
      btn.disabled = false;
      btn.textContent = 'Look up';
      return;
    }
  }

  if (addr.length < 26) {
    document.getElementById('errorPanel').style.display = 'block';
    document.getElementById('errorMsg').textContent = 'Enter a valid Bitcoin address (bc1p..., bc1q..., or 1...).';
    return;
  }

  currentAddress = addr;
  currentPage = 0;
  allNames = [];
  listedMap = {};

  document.getElementById('errorPanel').style.display = 'none';
  document.getElementById('resultsPanel').style.display = 'block';

  // Show address chip
  document.getElementById('addrChipText').textContent = addr.length > 32
    ? addr.slice(0, 16) + '...' + addr.slice(-8)
    : addr;

  // Reset stats
  ['statTotal','statListed','statValue','statBnrp'].forEach(id => {
    document.getElementById(id).textContent = '—';
  });
  ['statValueUsd'].forEach(id => document.getElementById(id).textContent = '');

  // Show skeleton
  showSkeleton();

  const btn = document.getElementById('lookupBtn');
  btn.disabled = true;
  btn.textContent = 'Scanning...';

  try {
    await fetchPage(0);
    renderGrid();
    updateStats();
    // Async: fetch listing data
    fetchListingData();
  } catch (e) {
    document.getElementById('portGrid').innerHTML = `
      <div class="port-empty">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <h3>Could not load portfolio</h3>
        <p>${e.message || 'API error. Try again.'}</p>
      </div>`;
  }

  btn.disabled = false;
  btn.textContent = 'Look up';
}

async function fetchPage(page) {
  // Use market worker /api/names for reliable BNS content filtering
  // Worker fetches all inscriptions, resolves content via ordinals.com, and filters by TLD
  const res = await fetch(
    `${MARKET_API}/api/names?address=${encodeURIComponent(currentAddress)}`,
    { signal: AbortSignal.timeout(60000) }
  );
  if (!res.ok) throw new Error(`Worker error ${res.status}`);
  const payload = await res.json();
  if (!payload.ok) throw new Error(payload.error || 'Worker returned error');

  const names = payload.names || [];
  const found = names.map(item => ({
    name: (item.name || '').trim().toLowerCase(),
    inscriptionId: item.inscriptionId || null,
    satpoint: null,
    hasBnrp: false,
    listed: false,
    priceSats: null,
  })).filter(n => n.name);

  allNames = found;  // worker returns all at once, no pagination needed
  hasMore = false;
  currentPage = 0;

  document.getElementById('loadMoreWrap').style.display = 'none';
  document.getElementById('loadMoreBtn').disabled = false;
}

async function loadMore() {
  const btn = document.getElementById('loadMoreBtn');
  btn.disabled = true;
  btn.textContent = 'Loading...';
  try {
    await fetchPage(currentPage + 1);
    renderGrid();
    updateStats();
  } catch {}
  btn.textContent = 'Load more';
}

async function fetchListingData() {
  // Check listing status and BNRP data for all names in parallel (batched)
  const names = allNames.map(n => n.name);
  const BATCH = 6;

  for (let i = 0; i < names.length; i += BATCH) {
    const batch = names.slice(i, i + BATCH);
    await Promise.allSettled(batch.map(async (name) => {
      try {
        // Check market listing
        const listRes = await fetch(`${MARKET_API}/api/listing?name=${encodeURIComponent(name)}`);
        const listData = await listRes.json();
        const nameObj = allNames.find(n => n.name === name);
        if (nameObj && listData.ok && listData.listed) {
          nameObj.listed = true;
          nameObj.priceSats = listData.priceSats;
          nameObj.auctionId = listData.auctionId;
        }

        // Check BNRP identity
        const bnrpRes = await fetch(`https://bnrp.name/api/resolve?domain=${encodeURIComponent(name)}`);
        const bnrpData = await bnrpRes.json();
        if (nameObj) {
          const records = bnrpData?.records || bnrpData?.data?.records;
          nameObj.hasBnrp = !!(records && (records.avatar || records.display || records.url));
          nameObj.avatar = records?.avatar;
          nameObj.display = records?.display;
        }
      } catch {}
    }));
    // Re-render after each batch
    renderGrid();
    updateStats();
  }
}

function getFilteredNames() {
  switch (currentTab) {
    case 'listed':   return allNames.filter(n => n.listed);
    case 'identity': return allNames.filter(n => n.hasBnrp);
    default:         return allNames;
  }
}

function renderGrid() {
  const names = getFilteredNames();
  const grid = document.getElementById('portGrid');

  if (names.length === 0 && allNames.length === 0) {
    grid.innerHTML = `
      <div class="port-empty">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M3 9h18"/><path d="M9 21V9"/></svg>
        <h3>No names found</h3>
        <p>This address does not own any Bitcoin names.</p>
      </div>`;
    return;
  }

  if (names.length === 0) {
    grid.innerHTML = `
      <div class="port-empty">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <h3>No names in this filter</h3>
        <p>Try switching to All.</p>
      </div>`;
    return;
  }

  grid.innerHTML = names.map(n => renderCard(n)).join('');

  // Update tab counts
  document.getElementById('tabAllCount').textContent = allNames.length;
  document.getElementById('tabListedCount').textContent = allNames.filter(n => n.listed).length;
  document.getElementById('tabIdentityCount').textContent = allNames.filter(n => n.hasBnrp).length;
}

function renderCard(n) {
  const avatarSrc = n.avatar && n.avatar.startsWith('ord:')
    ? `https://ordinals.com/content/${n.avatar.replace('ord:', '')}`
    : '';
  const inscShort = n.inscriptionId
    ? n.inscriptionId.slice(0, 10) + '...' + n.inscriptionId.slice(-6)
    : '';

  // Deterministic gradient avatar fallback
  const grad = (typeof nameGradient === 'function') ? nameGradient(n.name) : { from: '#f7931a', to: '#c0620a', text: '#fff' };
  const rawInitial = n.name ? n.name[0].toUpperCase() : '?';
  const initial = /[A-Z]/i.test(rawInitial) ? rawInitial : '₿';
  const avatarStyle = !avatarSrc
    ? `background:linear-gradient(135deg,${grad.from},${grad.to});color:${grad.text};display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1.1rem;`
    : '';
  const avatarContent = !avatarSrc
    ? `<span style="pointer-events:none;">${initial}</span>`
    : `<img src="${avatarSrc}" alt="${n.display || n.name}" loading="lazy" onerror="this.parentElement.innerHTML='<span style=\'pointer-events:none;\'>${initial}</span>';this.parentElement.style.cssText='${avatarStyle}';" />`;

  const priceHtml = n.listed && n.priceSats
    ? `<div class="port-card__price">
        <span>Listed</span>
        <span class="port-card__price-val">${fmtBtc(n.priceSats)}</span>
       </div>`
    : '';

  const badges = [];
  if (n.listed)          badges.push(`<span class="port-card__badge port-card__badge--listed">Listed</span>`);
  if (n.hasBnrp)         badges.push(`<span class="port-card__badge">Identity</span>`);
  if (n.isReInscription) badges.push(`<span class="port-card__badge" style="background:rgba(239,68,68,0.15);color:#ef4444;border-color:rgba(239,68,68,0.3);" title="This is a re-inscription. Only the first inscription is the canonical BNS name.">Re-inscription</span>`);

  const encodedName = encodeURIComponent(n.name);

  return `<a class="port-card" href="./name.html?name=${encodedName}" title="${n.name}">
    <div class="port-card__header">
      <div class="port-card__avatar" style="${avatarStyle}">
        ${avatarContent}
      </div>
      <div style="min-width:0;">
        <div class="port-card__name">${n.name}</div>
        ${n.display ? `<div class="port-card__insc" style="color:var(--color-text-faint);">${n.display}</div>` : `<div class="port-card__insc">${inscShort}</div>`}
      </div>
    </div>
    ${badges.length ? `<div class="port-card__badges">${badges.join('')}</div>` : ''}
    ${priceHtml}
    <div class="port-card__actions" onclick="event.preventDefault()">
      <a class="port-card__btn port-card__btn--primary" href="./name.html?name=${encodedName}">Profile</a>
      ${n.isReInscription
        ? `<span class="port-card__btn port-card__btn--outline" style="opacity:0.4;cursor:not-allowed;" title="Re-inscriptions cannot be listed">Sell</span>`
        : `<a class="port-card__btn port-card__btn--outline" href="./sell.html?name=${encodedName}" onclick="event.stopPropagation()">Sell</a>`
      }
    </div>
  </a>`;
}

async function updateStats() {
  const total = allNames.length;
  const listed = allNames.filter(n => n.listed).length;
  const withBnrp = allNames.filter(n => n.hasBnrp).length;
  const listedSats = allNames.filter(n => n.listed && n.priceSats).reduce((s, n) => s + n.priceSats, 0);

  document.getElementById('statTotal').textContent = total;
  document.getElementById('statListed').textContent = listed;
  document.getElementById('statBnrp').textContent = withBnrp;

  if (listedSats > 0) {
    document.getElementById('statValue').textContent = fmtBtc(listedSats);
    const rate = await getPortBtcUsd();
    document.getElementById('statValueUsd').textContent = fmtUsd(listedSats, rate);
  } else {
    document.getElementById('statValue').textContent = '—';
  }
}

function showSkeleton() {
  const grid = document.getElementById('portGrid');
  grid.innerHTML = Array(8).fill(0).map(() =>
    `<div class="port-card skeleton" style="height:156px; border-radius:var(--radius-lg);"></div>`
  ).join('');
}

// ── My Names ──────────────────────────────────────────────────────

// Wallet detection helper (mirrors buy-modal.js / sell.html)
function detectWallet() {
  if (typeof window === 'undefined') return null;
  if (window.unisat) return { type: 'unisat', api: window.unisat };
  if (window.XverseProviders?.BitcoinProvider) return { type: 'xverse', api: window.XverseProviders.BitcoinProvider };
  if (window.btc) return { type: 'xverse', api: window.btc };
  return null;
}

async function loadMyNames(address) {
  const section = document.getElementById('myNamesSection');
  const grid    = document.getElementById('myNamesGrid');
  const addrEl  = document.getElementById('myNamesAddr');
  if (!section || !grid) return;

  section.style.display = 'block';
  addrEl.textContent = address.slice(0, 12) + '...' + address.slice(-6);

  // Skeleton + loading note
  grid.innerHTML = Array(6).fill(0).map(() =>
    `<div class="name-card skeleton" style="height:88px; border-radius:var(--radius-lg);"></div>`
  ).join('') + `<p style="grid-column:1/-1; font-size:var(--text-xs); color:var(--color-text-faint); margin-top:var(--space-2);" id="myNamesLoadingNote">Scanning inscriptions... this may take up to 30s for large wallets.</p>`;

  try {
    // Fetch all BNS names owned by address via market worker proxy (avoids CORS)
    // Worker fetches inscription-data from UniSat, then resolves content via ordinals.com
    const res = await fetch(
      `${MARKET_API}/api/names?address=${encodeURIComponent(address)}`,
      { signal: AbortSignal.timeout(60000) }  // can take ~30s for large wallets
    );
    if (!res.ok) throw new Error(`Worker error ${res.status}`);
    const payload = await res.json();
    if (!payload.ok) throw new Error(payload.error || 'Worker returned error');
    const names = payload.names || [];

    if (names.length === 0) {
      grid.innerHTML = `
        <div style="grid-column:1/-1; text-align:center; padding:var(--space-12) 0; color:var(--color-text-faint);">
          <div style="font-size:var(--text-lg); margin-bottom:var(--space-2);">No names found</div>
          <div style="font-size:var(--text-sm);">Register a Bitcoin name on <a href="https://unisat.io/bns" target="_blank" rel="noopener noreferrer" style="color:var(--color-primary);">UniSat</a></div>
        </div>`;
      return;
    }

    // Show re-inscription warning if any were filtered
    // (declared here, appended to grid after cards are rendered)

    // Filter out re-inscriptions — they are not the canonical name
    const validNames = names.filter(n => !n.isReInscription);
    const reInscriptionCount = names.length - validNames.length;

    grid.innerHTML = '';
    validNames.forEach(item => {
      const fullName = item.name || '';
      if (!fullName) return;

      const card = document.createElement('div');
      card.className = 'name-card';
      card.id = 'myname-card-' + fullName.replace(/[^a-z0-9]/g, '_');
      card.dataset.name = fullName;
      card.style.cssText = 'cursor:default; position:relative;';

      const base = fullName.includes('.') ? fullName.split('.').slice(0, -1).join('.') : fullName;
      const tld  = fullName.includes('.') ? '.' + fullName.split('.').pop() : '';

      card.innerHTML = `
        <div class="name-card__name">
          <span style="font-family:var(--font-mono); font-weight:700;">${base}</span><span style="color:var(--color-primary); font-family:var(--font-mono);">${tld}</span>
        </div>
        <div class="name-card__listing-badge" style="display:none; font-size:11px; font-family:var(--font-mono); font-weight:600; color:#f7931a; background:rgba(247,147,26,0.12); border:1px solid rgba(247,147,26,0.3); border-radius:99px; padding:3px 10px;"></div>
        <div class="name-card__actions" style="display:flex; gap:var(--space-2); margin-top:auto;">
          <a href="./name.html?name=${encodeURIComponent(fullName)}" class="port-card__btn port-card__btn--outline" style="flex:1; text-align:center; font-size:var(--text-xs); text-decoration:none; display:flex; align-items:center; justify-content:center;">View</a>
          <a href="./sell.html?name=${encodeURIComponent(fullName)}" class="name-card__sell-btn port-card__btn port-card__btn--primary" style="flex:1; text-align:center; font-size:var(--text-xs); text-decoration:none; display:flex; align-items:center; justify-content:center;">List</a>
        </div>
      `;

      grid.appendChild(card);
    });

    // Show re-inscription notice if any were filtered out
    if (reInscriptionCount > 0) {
      const notice = document.createElement('div');
      notice.style.cssText = 'grid-column:1/-1; font-size:var(--text-xs); color:#ef4444; background:rgba(239,68,68,0.08); border:1px solid rgba(239,68,68,0.2); border-radius:var(--radius-md); padding:var(--space-3) var(--space-4); margin-top:var(--space-2);';
      notice.textContent = `${reInscriptionCount} re-inscription${reInscriptionCount > 1 ? 's' : ''} hidden. Only the first inscription of a name is valid.`;
      grid.appendChild(notice);
    }

    // Async: check listing status for each name and patch cards
    (async () => {
      const BATCH = 6;
      const allNames = validNames.map(n => n.name).filter(Boolean);
      for (let i = 0; i < allNames.length; i += BATCH) {
        await Promise.allSettled(allNames.slice(i, i + BATCH).map(async (fullName) => {
          try {
            const r = await fetch(`${MARKET_API}/api/listing?name=${encodeURIComponent(fullName)}`, {
              signal: AbortSignal.timeout(20000),
            });
            const d = await r.json();
            if (!d.ok || !d.listed) return;
            // Find card by data-name (reliable) or id (fallback)
            const cardEl = grid.querySelector(`[data-name="${fullName}"]`) ||
                           document.getElementById('myname-card-' + fullName.replace(/[^a-z0-9]/g, '_'));
            if (!cardEl) return;
            // Show listed badge with price
            const badge = cardEl.querySelector('.name-card__listing-badge');
            const sellBtn = cardEl.querySelector('.name-card__sell-btn');
            if (badge) {
              const btcAmt = d.priceSats
                ? (d.priceSats / 1e8).toFixed(8).replace(/0+$/, '').replace(/\.$/, '') + ' BTC'
                : 'Listed';
              badge.textContent = btcAmt;
              badge.style.display = 'block';
            }
            if (sellBtn) {
              sellBtn.textContent = 'Manage';
              sellBtn.style.background = 'none';
              sellBtn.style.border = '1px solid var(--color-border)';
              sellBtn.style.color = 'var(--color-text-muted)';
            }
          } catch { /* silent */ }
        }));
      }
    })();
  } catch (e) {
    grid.innerHTML = `<div style="grid-column:1/-1; color:var(--color-error, #ef4444); font-size:var(--text-sm);">Failed to load names: ${e.message}</div>`;
  }
}

function loadMyNamesRefresh() {
  const wallet = detectWallet();
  if (!wallet) return;
  if (wallet.type === 'unisat') {
    wallet.api.requestAccounts().then(accounts => {
      if (accounts?.[0]) loadMyNames(accounts[0]);
    }).catch(() => {});
  } else if (wallet.type === 'xverse') {
    wallet.api.request('getAccounts', { purposes: ['ordinals'] }).then(res => {
      const addr = res?.result?.[0]?.address;
      if (addr) loadMyNames(addr);
    }).catch(() => {});
  }
}

// Wire nav wallet button: after app.js sets the connected address, also load My Names
// We wrap setNavWalletConnected (defined in app.js) to call loadMyNames on this page.
(function patchNavWallet() {
  // Wait for app.js to define setNavWalletConnected, then wrap it
  const patch = () => {
    if (typeof setNavWalletConnected === 'function') {
      const _orig = setNavWalletConnected;
      window.setNavWalletConnected = function(address) {
        _orig(address);
        loadMyNames(address);
      };
    }
  };
  // app.js runs before this script, so it should already be defined
  patch();
})();

// Auto-detect wallet on load
(function autoConnectWallet() {
  const wallet = detectWallet();
  if (!wallet) return;
  // Silently check if already authorized (no prompt)
  if (wallet.type === 'unisat' && wallet.api.getAccounts) {
    wallet.api.getAccounts().then(accounts => {
      if (accounts && accounts[0]) {
        loadMyNames(accounts[0]);
      }
    }).catch(() => {});
  }
})();
