<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio — BTC Native</title>
  <meta name="description" content="View all Bitcoin names owned by a BTC address." />
  <link rel="preconnect" href="https://api.fontshare.com" />
  <link rel="stylesheet" href="./base.css" />
  <link rel="stylesheet" href="./style.css" />
  <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg" />
  <style>
    .port-wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: var(--space-10) var(--space-4) var(--space-16);
    }

    /* Search bar */
    .port-search-row {
      display: flex;
      gap: var(--space-2);
      margin-bottom: var(--space-8);
    }
    .port-addr-input {
      flex: 1;
      height: 48px;
      padding: 0 var(--space-4);
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      color: var(--color-text);
      font-size: var(--text-sm);
      font-family: var(--font-mono);
      outline: none;
      transition: border-color 0.15s;
      min-width: 0;
    }
    .port-addr-input:focus { border-color: var(--color-primary); }
    .port-addr-input::placeholder { color: var(--color-text-faint); font-size: var(--text-xs); }
    .port-search-btn {
      height: 48px;
      padding: 0 var(--space-5);
      background: var(--color-primary);
      color: #000;
      border: none;
      border-radius: var(--radius-md);
      font-weight: 700;
      font-size: var(--text-sm);
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s;
      flex-shrink: 0;
    }
    .port-search-btn:hover { opacity: 0.88; }
    .port-search-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    /* Header row */
    .port-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-5);
      min-height: 32px;
    }
    .port-header h2 {
      font-size: var(--text-lg);
      font-weight: 700;
      color: var(--color-text);
      margin: 0;
    }
    .port-count {
      font-size: var(--text-xs);
      color: var(--color-text-faint);
      font-family: var(--font-mono);
    }

    /* Tab bar */
    .port-tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--color-divider);
      margin-bottom: var(--space-6);
    }
    .port-tab {
      padding: var(--space-2) var(--space-4);
      font-size: var(--text-sm);
      font-weight: 500;
      color: var(--color-text-muted);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      margin-bottom: -1px;
      transition: color 0.15s, border-color 0.15s;
    }
    .port-tab:hover { color: var(--color-text); }
    .port-tab.active {
      color: var(--color-primary);
      border-bottom-color: var(--color-primary);
      font-weight: 700;
    }
    .port-tab-count {
      font-size: 10px;
      background: var(--color-surface-offset);
      border-radius: 99px;
      padding: 1px 6px;
      margin-left: 4px;
      color: var(--color-text-faint);
    }

    /* Grid */
    .port-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: var(--space-3);
    }

    /* Name card */
    .port-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: var(--space-4);
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s;
      text-decoration: none;
      color: inherit;
    }
    .port-card:hover {
      border-color: var(--color-border-strong);
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    [data-theme="dark"] .port-card:hover {
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }
    .port-card__header {
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }
    .port-card__avatar {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-full);
      background: var(--color-surface-offset);
      overflow: hidden;
      flex-shrink: 0;
    }
    .port-card__avatar img {
      width: 100%; height: 100%; object-fit: cover;
    }
    .port-card__name {
      font-family: var(--font-mono);
      font-size: var(--text-sm);
      font-weight: 700;
      color: var(--color-text);
      word-break: break-all;
    }
    .port-card__insc {
      font-size: 10px;
      color: var(--color-text-faint);
      font-family: var(--font-mono);
      word-break: break-all;
    }
    .port-card__badges {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-1);
    }
    .port-card__badge {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 99px;
      background: var(--color-surface-offset);
      color: var(--color-text-muted);
      border: 1px solid var(--color-border);
      font-family: var(--font-mono);
    }
    .port-card__badge--listed {
      background: color-mix(in srgb, #f7931a 12%, transparent);
      color: #f7931a;
      border-color: color-mix(in srgb, #f7931a 25%, transparent);
    }
    .port-card__price {
      font-size: var(--text-xs);
      font-family: var(--font-mono);
      color: var(--color-text-muted);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .port-card__price-val {
      font-weight: 700;
      color: var(--color-text);
    }
    .port-card__price-usd {
      color: var(--color-text-faint);
      font-weight: 400;
    }
    .port-card__actions {
      display: flex;
      gap: var(--space-2);
      margin-top: auto;
    }
    .port-card__btn {
      flex: 1;
      height: 30px;
      border-radius: var(--radius-sm);
      font-size: 11px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      transition: opacity 0.15s;
      text-align: center;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .port-card__btn:hover { opacity: 0.85; }
    .port-card__btn--primary {
      background: var(--color-primary);
      color: #000;
    }
    .port-card__btn--outline {
      background: none;
      border: 1px solid var(--color-border);
      color: var(--color-text-muted);
    }

    /* Stats bar */
    .port-stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: var(--space-3);
      margin-bottom: var(--space-6);
    }
    @media (max-width: 600px) {
      .port-stats { grid-template-columns: repeat(2, 1fr); }
    }
    .port-stat {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: var(--space-3) var(--space-4);
    }
    .port-stat__label {
      font-size: var(--text-xs);
      color: var(--color-text-faint);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: var(--space-1);
    }
    .port-stat__val {
      font-size: var(--text-base);
      font-weight: 800;
      font-family: var(--font-mono);
      color: var(--color-text);
    }
    .port-stat__val--accent { color: var(--color-primary); }
    .port-stat__sub {
      font-size: var(--text-xs);
      color: var(--color-text-faint);
      margin-top: 2px;
    }

    /* Load more */
    .port-load-wrap {
      text-align: center;
      margin-top: var(--space-6);
    }
    .port-load-btn {
      height: 40px;
      padding: 0 var(--space-8);
      background: none;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      color: var(--color-text-muted);
      font-size: var(--text-sm);
      font-weight: 600;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .port-load-btn:hover { border-color: var(--color-primary); color: var(--color-primary); }
    .port-load-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Skeleton */
    .port-card.skeleton-card {
      height: 156px;
    }

    /* Empty state */
    .port-empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: var(--space-16) var(--space-6);
      color: var(--color-text-faint);
    }
    .port-empty svg { margin-bottom: var(--space-4); opacity: 0.35; }
    .port-empty h3 { font-size: var(--text-base); color: var(--color-text-muted); margin-bottom: var(--space-2); }
    .port-empty p { font-size: var(--text-sm); max-width: 36ch; margin: 0 auto; }

    /* Address chip */
    .port-addr-chip {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-1) var(--space-3);
      background: var(--color-surface-offset);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-full);
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      margin-bottom: var(--space-6);
      word-break: break-all;
    }

    /* Heading area */
    .port-hero {
      margin-bottom: var(--space-6);
    }
    .port-hero h1 {
      font-size: var(--text-2xl);
      font-weight: 800;
      font-family: var(--font-mono);
      color: var(--color-text);
      margin-bottom: var(--space-2);
    }
    .port-hero p {
      font-size: var(--text-sm);
      color: var(--color-text-muted);
    }
  </style>
</head>

<script>
// ── Portfolio page ─────────────────────────────────────────────────────────────
const UNISAT_API_KEY = 'd6082c62b212e154fb506f50957506bfefea2df898e02f7670a83791dd42a870';
const UNISAT_BASE    = 'https://open-api.unisat.io';
const MARKET_API     = 'https://btcnative-market.galanin.workers.dev';
const PAGE_SIZE      = 20;
const BTCNAME_TLDS   = ['.btc', '.sats', '.x', '.ord', '.gm', '.xbt', '.sat', '.unisat', '.fb'];

// BTC/USD
let _portBtcUsd = null;
async function getPortBtcUsd() {
  if (_portBtcUsd) return _portBtcUsd;
  try {
    const r = await fetch('https://mempool.space/api/v1/prices', { signal: AbortSignal.timeout(4000) });
    const d = await r.json();
    _portBtcUsd = d.USD || 95000;
  } catch { _portBtcUsd = 95000; }
  return _portBtcUsd;
}

function fmtBtc(sats) {
  if (!sats || isNaN(sats)) return '—';
  const btc = sats / 1e8;
  if (btc >= 1)    return btc.toFixed(4).replace(/\.?0+$/, '') + ' BTC';
  if (btc >= 0.01) return btc.toFixed(4).replace(/0+$/, '') + ' BTC';
  return btc.toFixed(8).replace(/0+$/, '') + ' BTC';
}
function fmtUsd(sats, rate) {
  if (!sats || !rate) return '';
  const usd = (sats / 1e8) * rate;
  if (usd >= 1000) return '$' + Math.round(usd).toLocaleString();
  if (usd >= 1) return '$' + usd.toFixed(2);
  return '$' + usd.toFixed(2);
}

function isBtcName(content) {
  if (!content) return false;
  const lower = content.toLowerCase().trim();
  return BTCNAME_TLDS.some(tld => lower.endsWith(tld));
}

// State
let allNames = [];         // all loaded name objects
let listedMap = {};        // name -> { listed, priceSats, auctionId }
let currentTab = 'all';
let currentAddress = '';
let currentPage = 0;
let hasMore = false;

// Tab switching
document.querySelectorAll('.port-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.port-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTab = btn.dataset.tab;
    renderGrid();
  });
});

// Load more
document.getElementById('loadMoreBtn').addEventListener('click', loadMore);

// Search button / enter
document.getElementById('lookupBtn').addEventListener('click', startLookup);
document.getElementById('addrInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') startLookup();
});

// Pre-fill from URL
(function() {
  const params = new URLSearchParams(location.search);
  const addr = params.get('address') || params.get('addr');
  if (addr) {
    document.getElementById('addrInput').value = addr;
    startLookup();
  }
})();

async function startLookup() {
  let addr = document.getElementById('addrInput').value.trim();
  if (!addr) return;

  // If input looks like a name (contains a dot, no spaces, not starting with bc1/1/3)
  const looksLikeName = addr.includes('.') && !addr.startsWith('bc1') && !addr.startsWith('1') && !addr.startsWith('3') && !addr.includes('@');
  if (looksLikeName) {
    const btn = document.getElementById('lookupBtn');
    btn.disabled = true;
    btn.textContent = 'Resolving...';
    try {
      const res = await fetch(`https://bnrp.name/api/resolve?domain=${encodeURIComponent(addr)}`);
      const data = await res.json();
      const owner = data?.address || data?.data?.address || data?.owner;
      if (owner) {
        document.getElementById('addrInput').value = owner;
        addr = owner;
      } else {
        document.getElementById('errorPanel').style.display = 'block';
        document.getElementById('errorMsg').textContent = `Could not resolve ${addr} to an address.`;
        btn.disabled = false;
        btn.textContent = 'Look up';
        return;
      }
    } catch {
      document.getElementById('errorPanel').style.display = 'block';
      document.getElementById('errorMsg').textContent = 'Resolution failed. Try entering the address directly.';
      btn.disabled = false;
      btn.textContent = 'Look up';
      return;
    }
  }

  if (addr.length < 26) {
    document.getElementById('errorPanel').style.display = 'block';
    document.getElementById('errorMsg').textContent = 'Enter a valid Bitcoin address (bc1p..., bc1q..., or 1...).';
    return;
  }

  currentAddress = addr;
  currentPage = 0;
  allNames = [];
  listedMap = {};

  document.getElementById('errorPanel').style.display = 'none';
  document.getElementById('resultsPanel').style.display = 'block';

  // Show address chip
  document.getElementById('addrChipText').textContent = addr.length > 32
    ? addr.slice(0, 16) + '...' + addr.slice(-8)
    : addr;

  // Reset stats
  ['statTotal','statListed','statValue','statBnrp'].forEach(id => {
    document.getElementById(id).textContent = '—';
  });
  ['statValueUsd'].forEach(id => document.getElementById(id).textContent = '');

  // Show skeleton
  showSkeleton();

  const btn = document.getElementById('lookupBtn');
  btn.disabled = true;
  btn.textContent = 'Loading...';

  try {
    await fetchPage(0);
    renderGrid();
    updateStats();
    // Async: fetch listing data
    fetchListingData();
  } catch (e) {
    document.getElementById('portGrid').innerHTML = `
      <div class="port-empty">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <h3>Could not load portfolio</h3>
        <p>${e.message || 'API error. Try again.'}</p>
      </div>`;
  }

  btn.disabled = false;
  btn.textContent = 'Look up';
}

async function fetchPage(page) {
  // Fetch inscriptions owned by address via UniSat
  const res = await fetch(`${UNISAT_BASE}/v1/indexer/address/${currentAddress}/inscription-utxo-data?cursor=${page * PAGE_SIZE}&size=${PAGE_SIZE}`, {
    headers: { 'Authorization': `Bearer ${UNISAT_API_KEY}` },
    signal: AbortSignal.timeout(10000),
  });
  const data = await res.json();
  if (data.code !== 0) throw new Error(data.msg || 'UniSat API error');

  const utxos = data.data?.utxo || [];
  let found = [];
  for (const utxo of utxos) {
    const inscriptions = utxo.inscriptions || [];
    for (const insc of inscriptions) {
      const content = insc.contentBody || insc.content || '';
      if (isBtcName(content)) {
        found.push({
          name: content.trim().toLowerCase(),
          inscriptionId: insc.inscriptionId || insc.id,
          satpoint: utxo.txid + ':' + utxo.vout,
          hasBnrp: false,  // will be checked async
          listed: false,
          priceSats: null,
        });
      }
    }
  }

  allNames = [...allNames, ...found];
  hasMore = (data.data?.total || 0) > (page + 1) * PAGE_SIZE;
  currentPage = page;

  document.getElementById('loadMoreWrap').style.display = hasMore ? 'block' : 'none';
  document.getElementById('loadMoreBtn').disabled = false;
}

async function loadMore() {
  const btn = document.getElementById('loadMoreBtn');
  btn.disabled = true;
  btn.textContent = 'Loading...';
  try {
    await fetchPage(currentPage + 1);
    renderGrid();
    updateStats();
  } catch {}
  btn.textContent = 'Load more';
}

async function fetchListingData() {
  // Check listing status and BNRP data for all names in parallel (batched)
  const names = allNames.map(n => n.name);
  const BATCH = 6;

  for (let i = 0; i < names.length; i += BATCH) {
    const batch = names.slice(i, i + BATCH);
    await Promise.allSettled(batch.map(async (name) => {
      try {
        // Check market listing
        const listRes = await fetch(`${MARKET_API}/api/listing?name=${encodeURIComponent(name)}`);
        const listData = await listRes.json();
        const nameObj = allNames.find(n => n.name === name);
        if (nameObj && listData.ok && listData.listed) {
          nameObj.listed = true;
          nameObj.priceSats = listData.priceSats;
          nameObj.auctionId = listData.auctionId;
        }

        // Check BNRP identity
        const bnrpRes = await fetch(`https://bnrp.name/api/resolve?domain=${encodeURIComponent(name)}`);
        const bnrpData = await bnrpRes.json();
        if (nameObj) {
          const records = bnrpData?.records || bnrpData?.data?.records;
          nameObj.hasBnrp = !!(records && (records.avatar || records.display || records.url));
          nameObj.avatar = records?.avatar;
          nameObj.display = records?.display;
        }
      } catch {}
    }));
    // Re-render after each batch
    renderGrid();
    updateStats();
  }
}

function getFilteredNames() {
  switch (currentTab) {
    case 'listed':   return allNames.filter(n => n.listed);
    case 'identity': return allNames.filter(n => n.hasBnrp);
    default:         return allNames;
  }
}

function renderGrid() {
  const names = getFilteredNames();
  const grid = document.getElementById('portGrid');

  if (names.length === 0 && allNames.length === 0) {
    grid.innerHTML = `
      <div class="port-empty">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M3 9h18"/><path d="M9 21V9"/></svg>
        <h3>No names found</h3>
        <p>This address does not own any Bitcoin names.</p>
      </div>`;
    return;
  }

  if (names.length === 0) {
    grid.innerHTML = `
      <div class="port-empty">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <h3>No names in this filter</h3>
        <p>Try switching to All.</p>
      </div>`;
    return;
  }

  grid.innerHTML = names.map(n => renderCard(n)).join('');

  // Update tab counts
  document.getElementById('tabAllCount').textContent = allNames.length;
  document.getElementById('tabListedCount').textContent = allNames.filter(n => n.listed).length;
  document.getElementById('tabIdentityCount').textContent = allNames.filter(n => n.hasBnrp).length;
}

function renderCard(n) {
  const avatarSrc = n.avatar && n.avatar.startsWith('ord:')
    ? `https://ordinals.com/content/${n.avatar.replace('ord:', '')}`
    : '';
  const inscShort = n.inscriptionId
    ? n.inscriptionId.slice(0, 10) + '...' + n.inscriptionId.slice(-6)
    : '';

  const priceHtml = n.listed && n.priceSats
    ? `<div class="port-card__price">
        <span>Listed</span>
        <span class="port-card__price-val">${fmtBtc(n.priceSats)}</span>
       </div>`
    : '';

  const badges = [];
  if (n.listed) badges.push(`<span class="port-card__badge port-card__badge--listed">Listed</span>`);
  if (n.hasBnrp) badges.push(`<span class="port-card__badge">Identity</span>`);

  const encodedName = encodeURIComponent(n.name);

  return `<a class="port-card" href="./name.html?name=${encodedName}" title="${n.name}">
    <div class="port-card__header">
      <div class="port-card__avatar">
        ${avatarSrc ? `<img src="${avatarSrc}" alt="${n.display || n.name}" loading="lazy" onerror="this.style.display='none'" />` : ''}
      </div>
      <div style="min-width:0;">
        <div class="port-card__name">${n.name}</div>
        ${n.display ? `<div class="port-card__insc" style="color:var(--color-text-faint);">${n.display}</div>` : `<div class="port-card__insc">${inscShort}</div>`}
      </div>
    </div>
    ${badges.length ? `<div class="port-card__badges">${badges.join('')}</div>` : ''}
    ${priceHtml}
    <div class="port-card__actions" onclick="event.preventDefault()">
      <a class="port-card__btn port-card__btn--primary" href="./name.html?name=${encodedName}">Profile</a>
      <a class="port-card__btn port-card__btn--outline" href="./sell.html?name=${encodedName}" onclick="event.stopPropagation()">Sell</a>
    </div>
  </a>`;
}

async function updateStats() {
  const total = allNames.length;
  const listed = allNames.filter(n => n.listed).length;
  const withBnrp = allNames.filter(n => n.hasBnrp).length;
  const listedSats = allNames.filter(n => n.listed && n.priceSats).reduce((s, n) => s + n.priceSats, 0);

  document.getElementById('statTotal').textContent = total;
  document.getElementById('statListed').textContent = listed;
  document.getElementById('statBnrp').textContent = withBnrp;

  if (listedSats > 0) {
    document.getElementById('statValue').textContent = fmtBtc(listedSats);
    const rate = await getPortBtcUsd();
    document.getElementById('statValueUsd').textContent = fmtUsd(listedSats, rate);
  } else {
    document.getElementById('statValue').textContent = '—';
  }
}

function showSkeleton() {
  const grid = document.getElementById('portGrid');
  grid.innerHTML = Array(8).fill(0).map(() =>
    `<div class="port-card skeleton" style="height:156px; border-radius:var(--radius-lg);"></div>`
  ).join('');
}
</script>
